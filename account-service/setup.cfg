[flake8]
max-line-length = 100
exclude = .git,__pycache__,migrations,venv,.venv
extend-ignore = E203, W503

[mypy]
python_version = 3.11
ignore_missing_imports = True
strict = False

[isort]
profile = black
known_django = django
known_third_party = rest_framework,rest_framework_simplejwt,drf_spectacular
known_first_party = apps,config

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py

[coverage:report]
show_missing = True
skip_covered = False
